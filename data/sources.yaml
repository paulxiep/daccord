# Tier 1D — declarative spec of the regulatory PDF corpus.
#
# Each source produces one file on disk at:
#     data/raw/<jurisdiction>/<framework>/<filename>
#
# Modes:
#   url:    fetched by scripts/download_corpus.py
#   manual: user places the file at the expected path; the script hashes it
#
# Edit policy: change a `url:` to `manual:` if a regulator's portal becomes
# unscrapable; add new entries when ops-resilience frameworks are layered in.
#
# URL stability notes (verified May 2026):
#   - gesetze-im-internet.de's framework root PDFs are maintained in place
#   - EUR-Lex CELEX consolidated URLs are stable; GDPR has no in-force amendments yet,
#     so 02016R0679-20160504 is the latest consolidated version
#   - privacy.gov.ph hosts versioned uploads; IRR_as-amended.pdf is current
#   - pdp.gov.my hosts versioned uploads; Act 709 v2022 + amendment A1727 (2024) cover current law
#   - mdes.go.th hosts the official English translation of PDPA-TH
# Portals requiring manual download (browser-only — UA-blocked or 200-empty for scrapers):
#   - legislation.gov.uk (UK-GDPR, DPA 2018)
#   - sso.agc.gov.sg (PDPA-SG)
#   - ratchakitcha.soc.go.th (PDPA-TH Thai original)
#   - legifrance.gouv.fr (Loi I+L — no stable consolidated-PDF endpoint)

sources:
  # ---- EU spine ----
  - framework: gdpr
    jurisdiction: eu
    filename: reg_2016_679_consolidated.pdf
    description: GDPR Reg (EU) 2016/679 consolidated text (no in-force amendments yet)
    url: https://eur-lex.europa.eu/legal-content/EN/TXT/PDF/?uri=CELEX:02016R0679-20160504

  # ---- United Kingdom ----
  # legislation.gov.uk's data.pdf returns 200-with-empty-body to non-browser
  # clients (works in a browser). Marked manual until a stable scraper-friendly
  # consolidated-text endpoint is found.
  - framework: uk_gdpr
    jurisdiction: uk
    filename: uk_gdpr_current.pdf
    description: |
      UK GDPR consolidated text.
      MANUAL: open https://www.legislation.gov.uk/eur/2016/679/contents in a
      browser → "Print Options" → "Print The Whole Regulation" → save as PDF.
    manual: true

  - framework: dpa_2018
    jurisdiction: uk
    filename: dpa_2018_current.pdf
    description: |
      UK Data Protection Act 2018 consolidated text.
      MANUAL: open https://www.legislation.gov.uk/ukpga/2018/12/contents in a
      browser → "Print Options" → "Print The Whole Act" → save as PDF.
    manual: true

  # ---- Germany ----
  - framework: bdsg
    jurisdiction: de
    filename: bdsg_de_current.pdf
    description: BDSG (German federal data protection act), current German text
    url: https://www.gesetze-im-internet.de/bdsg_2018/BDSG.pdf

  - framework: bdsg
    jurisdiction: de
    filename: bdsg_en_current.pdf
    description: BDSG official English translation (may lag German source)
    url: https://www.gesetze-im-internet.de/englisch_bdsg/englisch_bdsg.pdf

  # ---- France ----
  - framework: loi_il
    jurisdiction: fr
    filename: loi_78_17_consolidated.pdf
    description: |
      Loi n° 78-17 (Informatique et Libertés) consolidated.
      MANUAL: download from https://www.legifrance.gouv.fr/loda/id/JORFTEXT000000886460/
      (use "Télécharger en PDF"). Légifrance has no stable URL for consolidated PDFs.
    manual: true

  # ---- Singapore ----
  # SSO returns 403 to non-browser User-Agents. Manual download is fast.
  - framework: pdpa_sg
    jurisdiction: sg
    filename: pdpa_sg_current.pdf
    description: |
      PDPA-SG current consolidated text from Singapore Statutes Online.
      MANUAL: open https://sso.agc.gov.sg/Act/PDPA2012 in a browser → "Get PDF"
      (top-right toolbar). Save the resulting PDF here.
    manual: true

  # ---- Thailand ----
  # ratchakitcha.soc.go.th returns 403 to non-browser clients.
  - framework: pdpa_th
    jurisdiction: th
    filename: pdpa_th_thai_2019.pdf
    description: |
      PDPA-TH B.E. 2562 (2019) — พระราชบัญญัติคุ้มครองข้อมูลส่วนบุคคล พ.ศ. ๒๕๖๒
      MANUAL: open https://ratchakitcha.soc.go.th/documents/17082307.pdf in a
      browser and save the PDF. (Old /DATA/PDF/2562/A/069/T_0052.PDF path is dead.)
    manual: true

  - framework: pdpa_th
    jurisdiction: th
    filename: pdpa_th_english_2019.pdf
    description: PDPA-TH B.E. 2562 (2019), English translation via Min. of Digital Economy
    url: https://www.mdes.go.th/uploads/tinymce/source/%E0%B8%AA%E0%B8%84%E0%B8%AA/Personal%20Data%20Protection%20Act%202019.pdf

  # ---- Philippines ----
  - framework: dpa_2012_ph
    jurisdiction: ph
    filename: dpa_2012_ph.pdf
    description: RA 10173 Data Privacy Act of 2012 (principal act)
    url: https://privacy.gov.ph/wp-content/uploads/2017/03/DPA-of-2012.pdf

  - framework: dpa_2012_ph
    jurisdiction: ph
    filename: dpa_2012_ph_irr_amended.pdf
    description: IRR of RA 10173 as amended (current)
    url: https://privacy.gov.ph/wp-content/uploads/2023/06/IRR_RA-10173-as-amended.pdf

  # ---- Malaysia ----
  - framework: pdpa_my
    jurisdiction: my
    filename: pdpa_my_act709_bilingual.pdf
    description: PDPA-MY Act 709 (principal) bilingual MY+EN, v2022 reprint
    url: https://www.pdp.gov.my/ppdpv1/wp-content/uploads/2024/07/UNDANG-UNDANG-MALAYSIA_AKTA_PERLINDUNGAN_DATA_PERIBADI_2010_709_MALAY_AND-ENG_V2022.pdf

  - framework: pdpa_my
    jurisdiction: my
    filename: pdpa_my_amendment_act_a1727_2024.pdf
    description: PDPA-MY Amendment Act A1727 (2024) — in force during 2025
    url: https://www.pdp.gov.my/ppdpv1/wp-content/uploads/2024/11/Act-A1727.pdf
