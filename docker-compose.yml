# d'accord dev environment — Linux containers replacing the Windows-native
# conda + uv setup. See CLAUDE.md for the full invocation pattern.
#
# Naming: services map 1:1 to top-level pipeline stages.
#   - root      → shared daccord lib (src/daccord/, tests/, ruff/pyright/pytest)
#   - eval      → envs/eval/    (tier 2B harness + retrieval baseline at 12B)
#   - audit     → envs/audit/   (tier 2C tokenizer audit)
#   - bakeoff   → envs/bakeoff/ (tier 2D Marker vs Typhoon-OCR; GPU service)
#   - baseline  → envs/baseline/(tier 3A Qwen2.5-7B 4-bit-NF4 baseline; GPU service)
#   - ingest    → envs/ingest/  (tier 4 full-corpus PDF→markdown via Marker; GPU service)
#   - consumer  → consumer/     (Streamlit side-by-side; lands at tier 12C)
#
# Volume strategy:
#   - Project source: bind-mounted from Windows host at /workspace.
#     Code edits via Windows IDE land instantly in the container.
#   - .venv per env: named volume overlays the bind mount path. Keeps Linux
#     binaries out of the Windows host filesystem and avoids Docker-Desktop
#     bind-mount I/O cost on uv's hot path. Wipe via:
#       docker volume rm d-accord_daccord-venv-eval
#   - uv wheel cache: shared named volume across all services. Pulling torch
#     once benefits eval + bakeoff + future training.
#   - HF model cache: shared named volume. MPNet (~500MB) + future Qwen2.5-7B
#     (~15GB) download once, reused.
#
# Usage pattern (full reference in CLAUDE.md):
#   docker compose run --rm root uv sync
#   docker compose run --rm eval uv run pytest
#   docker compose run --rm bakeoff python -c "import torch; ..."

services:
  root:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
      - daccord-uv-cache:/root/.cache/uv
      - daccord-hf-cache:/root/.cache/huggingface
      - daccord-venv-root:/workspace/.venv
    working_dir: /workspace
    # tty + stdin_open make `docker compose run --rm root bash` interactive.
    # `docker compose run --rm root uv sync` overrides this with the bash one-shot.
    tty: true
    stdin_open: true

  eval:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
      - daccord-uv-cache:/root/.cache/uv
      - daccord-hf-cache:/root/.cache/huggingface
      - daccord-venv-eval:/workspace/envs/eval/.venv
    working_dir: /workspace/envs/eval
    # API keys for Groq + Gemini live in .env.local (gitignored on host).
    # env_file picks them up so live runs work; absent keys are tolerated for
    # dry-runs + pytest (the harness uses fake clients there).
    env_file:
      - path: .env.local
        required: false
    tty: true
    stdin_open: true

  audit:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
      - daccord-uv-cache:/root/.cache/uv
      - daccord-hf-cache:/root/.cache/huggingface
      - daccord-venv-audit:/workspace/envs/audit/.venv
    working_dir: /workspace/envs/audit
    tty: true
    stdin_open: true

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    # Streamlit's default port. `docker compose run --rm --service-ports consumer
    # streamlit run app.py` exposes it; plain `run` does not unless ports is set
    # at service level.
    ports:
      - "8501:8501"
    volumes:
      - .:/workspace
      - daccord-uv-cache:/root/.cache/uv
      - daccord-hf-cache:/root/.cache/huggingface
      - daccord-venv-consumer:/workspace/consumer/.venv
    working_dir: /workspace/consumer
    env_file:
      - path: .env.local
        required: false
    tty: true
    stdin_open: true

  bakeoff:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    # GPU passthrough — requires Docker Desktop with WSL2 backend + an NVIDIA
    # Windows driver supporting CUDA 12.8+. Verified at write time: driver
    # 581.15 + RTX 5080 work end-to-end with `--gpus all`.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/workspace
      - daccord-uv-cache:/root/.cache/uv
      - daccord-hf-cache:/root/.cache/huggingface
      # Surya (the layout/OCR backend Marker uses) writes models to
      # ~/.cache/datalab/models/, NOT to ~/.cache/huggingface/. Without this
      # named volume the ~3 GB of surya weights download fresh every container
      # run — at Docker Desktop network speeds (~200 KB/s sustained) that's
      # a 4-hour cost per run. The volume is shared with `ingest` so tier-2D
      # + tier-4 amortise the download.
      - daccord-datalab-cache:/root/.cache/datalab
      - daccord-venv-bakeoff:/workspace/envs/bakeoff/.venv
    working_dir: /workspace/envs/bakeoff
    tty: true
    stdin_open: true

  ingest:
    # Tier 4 — full-corpus PDF→markdown via Marker (locked at 2D). Same
    # CUDA image as bakeoff/baseline; Python 3.13 pin in envs/ingest/ is
    # marker-pdf-driven (pillow<11 ceiling). Run from CLI:
    #   docker compose run --rm ingest uv sync
    #   docker compose run --rm ingest uv run python scripts/parse_corpus.py \
    #     --subset toy --verbose
    #   docker compose run --rm ingest uv run python scripts/parse_corpus.py \
    #     --subset full --verbose
    build:
      context: .
      dockerfile: Dockerfile.cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/workspace
      - daccord-uv-cache:/root/.cache/uv
      - daccord-hf-cache:/root/.cache/huggingface
      # Shared with bakeoff — surya layout/OCR weights live under
      # ~/.cache/datalab/, downloaded once and reused across all Marker runs.
      # Without this, the ~3 GB surya download repeats per container run.
      - daccord-datalab-cache:/root/.cache/datalab
      - daccord-venv-ingest:/workspace/envs/ingest/.venv
    working_dir: /workspace/envs/ingest
    # hf_transfer is a Rust-backed parallel-chunked HF downloader; the env var
    # below activates it for any `huggingface_hub` call inside this service.
    # Cut surya's ~3 GB first-run download from ~4 h (single-stream, observed
    # ~200 KB/s) to minutes. Safe-no-op if hf_transfer isn't installed.
    environment:
      HF_HUB_ENABLE_HF_TRANSFER: "1"
    tty: true
    stdin_open: true

  baseline:
    # Tier 3A — local Qwen2.5-7B 4-bit-NF4 baseline. Same CUDA image as
    # bakeoff; Python 3.14 (the CUDA image's default) — bakeoff's 3.13 pin
    # is marker-pdf-specific and doesn't apply here. Run from CLI:
    #   docker compose run --rm baseline uv sync
    #   docker compose run --rm baseline uv run python ../eval/scripts/run_eval.py \
    #     --models qwen,groq,gemini --gold-path ../../data/gold/toy_v1.jsonl ...
    build:
      context: .
      dockerfile: Dockerfile.cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/workspace
      - daccord-uv-cache:/root/.cache/uv
      - daccord-hf-cache:/root/.cache/huggingface
      - daccord-venv-baseline:/workspace/envs/baseline/.venv
    working_dir: /workspace/envs/baseline
    # Live runs against Groq + Gemini (via the eval runner's API generators)
    # need API keys from .env (host-side, gitignored); the local Qwen path
    # needs no keys.
    env_file:
      - path: .env
        required: false
    tty: true
    stdin_open: true

volumes:
  daccord-uv-cache:
  daccord-hf-cache:
  # Surya (Marker's layout/OCR backend) writes ~3 GB of weights here on first
  # run. Shared between bakeoff (tier 2D) + ingest (tier 4) — one download
  # serves both. Wipe via: docker volume rm d-accord_daccord-datalab-cache
  daccord-datalab-cache:
  daccord-venv-root:
  daccord-venv-eval:
  daccord-venv-audit:
  daccord-venv-bakeoff:
  daccord-venv-baseline:
  daccord-venv-ingest:
  daccord-venv-consumer:
